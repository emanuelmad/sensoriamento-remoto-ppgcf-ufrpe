    <circle cx="52" cy="45" r="6" fill="#f06f5a"/>
    <circle cx="72" cy="45" r="6" fill="#f2c04f"/>
    <circle cx="92" cy="45" r="6" fill="#5dc28e"/>
    <g font-family="'Courier New', monospace" font-size="16" fill="#dfe9e2">
      <text x="46" y="104">var coleção = ee.ImageCollection(...)</text>
      <text x="46" y="134">  .filterDate('2013-01-01', '2020-12-31')</text>
      <text x="46" y="164">  .filterBounds(area_estudo);</text>
      <text x="46" y="208">Map.addLayer(imagem, vis, 'Landsat');</text>
      <text x="46" y="246">print('NDVI', imagem.normalizedDifference(...));</text>
