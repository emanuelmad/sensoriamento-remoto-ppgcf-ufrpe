<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Trilha GEE UFSM</title>
  <desc id="desc">Banner visual para a trilha de Google Earth Engine organizada por unidades.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123a45"/>
      <stop offset="55%" stop-color="#0f6b63"/>
      <stop offset="100%" stop-color="#d9b15c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1d24" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#0d1d24" stop-opacity="0.14"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="420" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.14">
