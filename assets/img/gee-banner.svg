    <text x="24" y="31" font-size="14" fill="#dbe8e0" opacity="0.8">Unidades</text>
    <text x="24" y="56" font-size="28" font-weight="700" fill="#ffffff">18 scripts</text>
    <text x="232" y="31" font-size="14" fill="#dbe8e0" opacity="0.8">Formato</text>
    <text x="232" y="56" font-size="28" font-weight="700" fill="#ffffff">.js por capítulo</text>
