name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compile Python modules
        run: python -m compileall scripts projetos

      - name: Validate JavaScript syntax
        run: |
          for file in cursos/gee-ufsm/codigos/*.js; do
            node --check "$file"
          done

      - name: Validate notebooks as JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          notebooks = sorted(Path("notebooks").glob("*.ipynb"))
          if not notebooks:
              raise SystemExit("No notebooks found to validate.")

          for path in notebooks:
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
              print(f"validated {path}")
          PY
