name: Novo projeto aplicado
description: Proponha um novo estudo de caso ou projeto final para a disciplina.
title: "[Projeto] "
labels:
  - projeto
  - aplicação
body:
  - type: input
    id: tema
    attributes:
      label: Tema do projeto
      placeholder: Ex. detecção de mudanças com Landsat
    validations:
      required: true
  - type: textarea
    id: problema
    attributes:
      label: Problema ou pergunta
      description: Qual problema geográfico, florestal ou ambiental o projeto deve responder?
    validations:
      required: true
  - type: textarea
    id: dados
    attributes:
      label: Dados e sensores
      description: Liste sensores, produtos e fontes previstas.
    validations:
      required: true
  - type: textarea
    id: saidas
    attributes:
      label: Saídas esperadas
      description: Mapas, índices, classificações, relatórios ou figuras.
    validations:
      required: true
