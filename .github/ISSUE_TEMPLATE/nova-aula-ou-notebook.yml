name: Nova aula ou notebook
description: Solicite a criação ou atualização de uma aula, notebook ou demonstração.
title: "[Aula] "
labels:
  - ensino
  - aula
body:
  - type: input
    id: tema
    attributes:
      label: Tema
      description: Tema principal da aula ou notebook.
      placeholder: Ex. composições coloridas e índices espectrais
    validations:
      required: true
  - type: textarea
    id: objetivo
    attributes:
      label: Objetivo didático
      description: O que os alunos devem aprender ao final.
    validations:
      required: true
  - type: textarea
    id: material
    attributes:
      label: Material esperado
      description: Descreva se a entrega será slide, PDF, notebook, script ou combinação.
    validations:
      required: true
  - type: textarea
    id: observacoes
    attributes:
      label: Observações
      description: Dependências, dados ou observações extras.
