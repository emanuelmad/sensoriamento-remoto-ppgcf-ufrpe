name: Nova aula ou notebook
description: Solicite a criacao ou atualizacao de uma aula, notebook ou demonstracao.
title: "[Aula] "
labels:
  - ensino
  - aula
body:
  - type: input
    id: tema
    attributes:
      label: Tema
      description: Tema principal da aula ou notebook.
      placeholder: Ex. composicoes coloridas e indices espectrais
    validations:
      required: true
  - type: textarea
    id: objetivo
    attributes:
      label: Objetivo didatico
      description: O que os alunos devem aprender ao final.
    validations:
      required: true
  - type: textarea
    id: material
    attributes:
      label: Material esperado
      description: Descreva se a entrega sera slide, PDF, notebook, script ou combinacao.
    validations:
      required: true
  - type: textarea
    id: observacoes
    attributes:
      label: Observacoes
      description: Dependencias, dados ou observacoes extras.
